{% extends 'hospital/hospital_dashboard.html' %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
{% block hospital %}

<style>
    .gradient-custom {
/* fallback for old browsers */
background: #1e263d;

/* Chrome 10-25, Safari 5.1-6 */
background: -webkit-linear-gradient(to right bottom, rgba(246, 211, 101, 1), rgba(253, 160, 133, 1));

/* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
background: linear-gradient(to right bottom, rgb(139, 132, 228), rgb(133, 145, 253))
}
</style>
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  margin-top: 70px; width: 100%; height: 500px;" >
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb_iner">
            <div class="breadcrumb_iner_item" >               
            </div>
          </div>
        </div>
      </div>
    </div>

  </section>
  <h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Update Profile</h3>

  <!-- breadcrumb start-->
  <br>

  <section class="contact-section section_padding">
    <div class="container">
    
      <div class="row ">
       
        <div class="col-lg-8 mx-auto">
          <form class="form-contact contact_form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <p>Enter hospital image</p>
                        <img src="../../static/media/{{data.image}}" style="width: 50%;height: 150px;" alt="">
                      <input class="form-control" name="image" type="file" onfocus="this.placeholder = ''"
                        onblur="this.placeholder = 'Enter hospital image'" placeholder='Enter hospital image'>
                    </div>
                  </div>
              
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" value="{{data.phone}}" name="phone" pattern="[6789][0-9]{9}" maxlength="10" required  type="text" onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter phone'" placeholder='Enter phone'>
                </div>
              </div>
              
              
              <div class="col-12">
                <div class="form-group">

                  <textarea class="form-control w-100" name="address" cols="30" rows="9"
                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Address'"
                    placeholder='Enter Address'>{{data.hospital_address}}</textarea>
                </div>
              </div>
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" value="{{data.pincode}}" name="pincode" pattern="[0-9]+" maxlength="6" required  type="text" onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter hospital pincode'" placeholder='Enter hospital pincode'>
                </div>
              </div>
              <div class="col-sm-12">
                <div class="form-group">
                    <p>{{data.district}}</p>
                    <select class="form-control" name="district" aria-label="Default select example" style="display: block;
                    width: 100%;
                    padding: 0.375rem 0.75rem;
                    font-weight: 400;
                    line-height: 1.5;
                    color: #6c757d;
                    transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;">
                        <option selected disabled style="color: #495057;">Choose District from below</option>
                        <option value="Tvm">Tvm</option>
                        <option value="Kollam">Kollam</option>
                        <option value="Pathanamthitta">Pathanamthitta</option>
                        <option value="Alappuzha">Alappuzha</option>
                        <option value="Kottayam">Kottayam</option>
                        <option value="Idukki">Idukki</option>
                        <option value="Ernakulam">Ernakulam</option>
                        <option value="Thrissure">Thrissure</option>
                        <option value="Palakkad">Palakkad</option>
                        <option value="Malappuram">Malappuram</option>
                        <option value="Kozhikkode">Kozhikkode</option>
                        <option value="Wayanad">Wayanad</option>
                        <option value="Kannur">Kannur</option>
                        <option value="Kasargod">Kasargod</option>
                    </select>
                </div>
              </div>
              
            </div>
            <div class="form-group mt-3" style="text-align: center;">
              <button type="submit" class="button button-contactForm btn_1" style="border-radius: 5px;">Update</button>
            </div>
          </form>
        </div>
        
      </div>
    </div>
  </section>
{% endblock hospital %}
