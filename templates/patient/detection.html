{% extends 'patient/patient_dashboard.html' %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
{% block patient %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.card-registration .select-input.form-control[readonly]:not([disabled]) {
font-size: 1rem;
line-height: 2.15;
padding-left: .75em;
padding-right: .75em;
}
.card-registration .select-arrow {
top: 13px;
}
</style>
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  margin-top: 70px; width: 100%; height: 500px;" >
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb_iner">
            <div class="breadcrumb_iner_item" >               
            </div>
          </div>
        </div>
      </div>
    </div>

  </section>
  <!-- <h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Card Details</h3> -->

  <!-- breadcrumb start-->
  <!-- ================ contact section start ================= -->
  <section class="h-100 " style="background-color: #f4f5f7;">
    <div class="container py-5 h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col">
          <div class="card card-registration my-4">
            <div class="row g-0">
             
              <div class="col-xl-12">
                <div class="card-body p-md-5 text-black">
                  <h3 class="mb-5 text-uppercase " style="text-align: center;">Alzimers Prediction</h3>
                  <div class="container mt-5">

    <form method="post" enctype="multipart/form-data" onsubmit="showLoader()">
        {% csrf_token %}

        <div class="row g-3">

            <!-- Upload -->
            <div class="col-12">
                <input type="file" class="form-control border-0 bg-light px-4"
                       required name="img" style="height: 55px;">
            </div>

            <!-- Submit -->
            <div class="col-12">
                <button class="btn btn-primary w-100 py-3" type="submit">
                    Submit
                </button>
            </div>

            <!-- 🔄 LOADING -->
            <div class="col-12 text-center" id="loading" style="display:none;">
                <div class="spinner-border text-primary" role="status"></div>
                <h4 class="mt-2">Analyzing MRI... Please wait</h4>
            </div>

            <!-- RESULT -->
            <div class="col-12 text-center">
                {% if msg %}
                    <h2 class="text-success">{{ msg }}</h2>
                {% endif %}
            </div>

            <!-- Navigation -->
            <div class="col-12 text-center">
                <a href="/patient-viewhospitals/">View Doctors</a>
            </div>

        </div>
    </form>

</div>

<!-- JS -->
<script>
function showLoader() {
    document.getElementById("loading").style.display = "block";
}
</script>

                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        var eventDateInput = document.getElementById('date'); // Corrected ID
        var today = new Date().toISOString().split('T')[0];
        eventDateInput.setAttribute('min', today);

        var form = document.querySelector('.contact-form');
        form.addEventListener('submit', function(event) {
            var selectedDate = new Date(eventDateInput.value);
            var currentDate = new Date();

            // Set current date to start of day
            currentDate.setHours(0, 0, 0, 0);

            if (selectedDate < currentDate) {
                alert("Date must be greater than today's date.");
                event.preventDefault(); // Prevent form submission
            }
        });
    });
</script>
{% endblock patient %}
