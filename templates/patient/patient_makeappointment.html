{% extends 'patient/patient_dashboard.html' %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
{% block patient %}
<style>
.card-registration .select-input.form-control[readonly]:not([disabled]) {
font-size: 1rem;
line-height: 2.15;
padding-left: .75em;
padding-right: .75em;
}
.card-registration .select-arrow {
top: 13px;
}
</style>
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  margin-top: 70px; width: 100%; height: 500px;" >
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb_iner">
            <div class="breadcrumb_iner_item" >               
            </div>
          </div>
        </div>
      </div>
    </div>

  </section>
  <h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Appointment Request</h3>

  <!-- breadcrumb start-->
  <!-- ================ contact section start ================= -->
  <section class="h-100 " style="background-color: #f4f5f7;">
    <div class="container py-5 h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col">
          <div class="card card-registration my-4">
            <div class="row g-0">
             
              <div class="col-xl-12">
                <div class="card-body p-md-5 text-black">
                  <h3 class="mb-5 text-uppercase " style="text-align: center;">Appointment Request</h3>
                  <form action="" method="post">
                    {% csrf_token %}
                  <div class="row">
                    <div class="col-md-12 mb-4">
                      <div class="form-outline">
                        <label class="form-label" for="form3Example1m">Name</label>

                        <input type="text" value="{{patient.fname}} {{patient.lname}}" readonly id="form3Example1m" class="form-control form-control-lg" />
                      </div>
                    </div>
                    <div class="col-md-12 mb-4">
                      <div class="form-outline">
                        <label class="form-label" for="form3Example1n">Email</label>

                        <input type="text" id="form3Example1n" value="{{patient.email}}" readonly class="form-control form-control-lg" />
                      </div>
                    </div>
                  </div>
  
                  <div class="row">
                    <div class="col-md-12 mb-4">
                      <div class="form-outline">
                        <label class="form-label" for="form3Example1m1">Phone</label>

                        <input type="text" id="form3Example1m1" readonly value="{{patient.phone}}" class="form-control form-control-lg" />
                      </div>
                    </div>
                    <div class="col-md-12 mb-4">
                      <div class="form-outline">
                        <label class="form-label" for="form3Example1n1">Department</label>

                        <input type="text" id="form3Example1n1" readonly value="{{doctor.department.department_name}}" class="form-control form-control-lg" />
                      </div>
                    </div>
                  </div>
  
                  <div class="form-outline mb-4">
                    <label class="form-label" for="form3Example8">Preffered Doctor</label>

                    <input type="text" id="form3Example8" readonly value="{{doctor.fname}} {{doctor.lname}}" class="form-control form-control-lg" />
                  </div>
                  <div class="form-outline mb-4">
                    <label class="form-label" for="form3Example9">Preffered Date</label>
                    {% if formatted_date %}
                    {{formatted_date}}
                    <input type="text" name="app_date" value="{{formatted_date}}" readonly id="form3Example9" class="form-control form-control-lg" />
                    {% else %}
                    <input type="date" name="app_date" id="date" class="form-control form-control-lg" />
                    {% endif %}
                  </div>
                  <div class="d-md-flex justify-content-start align-items-center mb-4 py-2">
  
                    <h6 class="mb-0 me-4">Preffered Time: </h6>&nbsp;&nbsp;
                    
                    <!-- <div class="form-check form-check-inline mb-0 me-4">
                      <input class="form-check-input" type="radio" name="inlineRadioOptions" id=""
                        value="{{period}}" /><br>
                      <label class="form-check-label" for="" >{{period}}</label>
                    </div> -->
                    <select class="form-control" name="inlineRadioOptions" aria-label="Default select example" style="display: block;
                    width: 100%;
                    padding: 0.375rem 0.75rem;
                    font-weight: 400;
                    line-height: 1.5;
                    color: #6c757d;
                    transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;">
                        <option selected disabled style="color: #495057;">Choose time slot from below</option>
                        {% for period in periods %}
                        <option value="{{period}}">{{period}}</option>
                        {% endfor %}
                        <!-- <option value="Female">Female</option> -->
                    </select>
                    
                  </div>
                  <div class="form-group mt-3" style="text-align: center;">
                    <button type="submit" class="button button-contactForm btn_1" style="border-radius: 5px;">Send Request</button>
                  </div>
                </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        var eventDateInput = document.getElementById('date'); // Corrected ID
        var today = new Date().toISOString().split('T')[0];
        eventDateInput.setAttribute('min', today);

        var form = document.querySelector('.contact-form');
        form.addEventListener('submit', function(event) {
            var selectedDate = new Date(eventDateInput.value);
            var currentDate = new Date();

            // Set current date to start of day
            currentDate.setHours(0, 0, 0, 0);

            if (selectedDate < currentDate) {
                alert("Date must be greater than today's date.");
                event.preventDefault(); // Prevent form submission
            }
        });
    });
</script>
{% endblock patient %}
