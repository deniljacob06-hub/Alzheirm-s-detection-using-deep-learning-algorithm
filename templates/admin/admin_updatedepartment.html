{% extends 'admin/admin_dashboard.html' %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
{% block admin %}

<style>
    .gradient-custom {
/* fallback for old browsers */
background: #1e263d;

/* Chrome 10-25, Safari 5.1-6 */
background: -webkit-linear-gradient(to right bottom, rgba(246, 211, 101, 1), rgba(253, 160, 133, 1));

/* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
background: linear-gradient(to right bottom, rgb(139, 132, 228), rgb(133, 145, 253))
}
</style>
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  margin-top: 70px; width: 100%; height: 500px;" >
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb_iner">
            <div class="breadcrumb_iner_item" >               
            </div>
          </div>
        </div>
      </div>
    </div>

  </section>
  <h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Update Department</h3>

  <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->
  <section class="contact-section section_padding" style="margin-top: -65px;">
    <div class="container">
    
      <div class="row ">
        
        <div class="col-lg-8 mx-auto">
          <form class="form-contact contact_form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="department" pattern="[a-zA-Z ]+" value="{{department.department_name}}" type="text" pattern="[a-zA-Z ]+" required onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter department'" placeholder='Enter department'>
                </div>
              </div>
              
            </div>
            <div class="form-group mt-3" style="text-align: center;">
              <button type="submit" class="button button-contactForm btn_1" style="border-radius: 5px;">Update</button>
            </div>
          </form>
        </div>
        
      </div>
    </div>
  </section>
{% endblock admin %}
