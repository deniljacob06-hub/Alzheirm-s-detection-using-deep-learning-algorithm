{% extends 'admin/admin_dashboard.html' %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
{% block admin %}

<style>
    .gradient-custom {
/* fallback for old browsers */
background: #1e263d;

/* Chrome 10-25, Safari 5.1-6 */
background: -webkit-linear-gradient(to right bottom, rgba(246, 211, 101, 1), rgba(253, 160, 133, 1));

/* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
background: linear-gradient(to right bottom, rgb(139, 132, 228), rgb(133, 145, 253))
}
</style>
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  margin-top: 70px; width: 100%; height: 500px;" >
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb_iner">
            <div class="breadcrumb_iner_item" >               
            </div>
          </div>
        </div>
      </div>
    </div>

  </section>
  <h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Add Departments</h3>

  <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->
  <section class="contact-section section_padding" style="margin-top: -65px;">
    <div class="container">
    
      <div class="row ">
        
        <div class="col-lg-8 mx-auto">
          <form class="form-contact contact_form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="department"  type="text" pattern="[a-zA-Z ]+" required onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter department'" placeholder='Enter department'>
                </div>
              </div>
              
            </div>
            <div class="form-group mt-3" style="text-align: center;">
              <button type="submit" class="button button-contactForm btn_1" style="border-radius: 5px;">Add</button>
            </div>
          </form>
        </div>
        
      </div>
    </div>
  </section>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.1/css/all.min.css" integrity="sha256-2XFplPlrFClt0bIdPgpz8H7ojnk10H69xRqd9+uTShA=" crossorigin="anonymous" />
  <div class="container mb-4 ">
  <div class="col-lg-9 mt-lg-0 mx-auto">
      <div class="row  mx-auto">
        <div class="col-12" style="text-align: center;">
            <h2 class="contact-title" style="color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">View Departments</h2>
          </div>
        <div class="col-md-12">
          <div class="user-dashboard-info-box table-responsive mb-0 bg-white p-4 shadow-sm">
            <table class="table manage-candidates-top mb-0">
              <thead>
                <tr>
                
                  <th class="text-center">Status</th>
                  <th class="action text-center">Action</th>
                </tr>
              </thead>
              <tbody>
                {% for department in departments %}
                <tr class="candidates-list">
                  
                  <td class="candidate-list-favourite-time text-center">
                    <span class="candidate-list-time order-1">{{department.department_name}}</span>
                  </td>
                  <td>
                    <ul class="list-unstyled mb-0 d-flex justify-content-center">
                      <li style="margin-right: 15px;"><a href="/admin-updatedepartment?did={{department.id}}" class="text-info" data-toggle="tooltip" title="" data-original-title="Edit"><i class="fas fa-pencil-alt"></i></a></li>
                      <li><a href="/admin-deletedepartment?did={{department.id}}" class="text-danger" data-toggle="tooltip" title="" data-original-title="Delete"><i class="far fa-trash-alt"></i></a></li>
                    </ul>
                  </td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
           
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock admin %}
