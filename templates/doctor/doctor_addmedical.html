{% extends 'doctor/doctor_dashboard.html' %} 
{% for message in messages %}
<script>
  alert("{{message}}");
</script>
{% endfor %} 
{% block doctor %}
<style>
  .add,
  .add1 {
    text-decoration: none;
    display: inline-block;
    width: 30px;
    height: 30px;
    background: #1bc14a;
    font-style: 2rem;
    font-weight: bold;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .flex {
    display: flex;
    gap: 1.5em;
    margin-bottom: 15px;
    /* flex-wrap: wrap; */
  }
  .delete {
    text-decoration: none;
    display: inline-block;
    background: #f64336;
    color: #fff;
    font-size: 1.5rem;
    font-weight: bold;
    width: 70px;
    height: 30px;
    margin-left: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  input {
    padding: 5px 10px;
    background: #ddd;
    border: none;
    width: 50%;
    border-radius: 5px;
  }
  input:focus {
    outline: 1px solid black;
  }
  select {
    padding: 5px 10px;
    background: #ddd;
    border: none;
    width: 50%;
    border-radius: 5px;
  }
</style>
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  margin-top: 70px; width: 100%; height: 500px;" >
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb_iner">
            <div class="breadcrumb_iner_item" >               
            </div>
          </div>
        </div>
      </div>
    </div>

  </section>
  <h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Add Prescription Details</h3>
  
<!-- breadcrumb start-->
<br />

<!-- ================ contact section start ================= -->

<div class="container">
  <form action="" method="post">
    {% csrf_token %}
    <!-- <h2 style="text-align: center; margin-top: 10px; margin-bottom: 10px">
      Add Prescription Details
    </h2> -->
    <textarea
      name="symptoms"
      id=""
      cols="159"
      rows="4"
      style="margin-top: 10px; margin-bottom: 10px"
      placeholder="Add Symptoms"
    ></textarea>
    <textarea
      name="remarks"
      id=""
      cols="159"
      rows="4"
      style="margin-top: 10px; margin-bottom: 10px"
      placeholder="Add Remarks"
    ></textarea>
    <div
      style="
        border: 1px solid black;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 25px;
      "
    >
      <div class="wrap">
        <h3>Add Medicines</h3>
        <a href="#" class="add">&plus;</a>
      </div>
      <div class="inp-group"></div>
    </div>
    <div
      style="
        border: 1px solid black;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 10px;
      "
    >
      <div class="wrap">
        <h3>Add TestResults</h3>
        <a href="#" class="add1">&plus;</a>
      </div>
      <div class="inp-group1"></div>
    </div>
    <div>
      <div class="form-check">
        <p>Need for next booking?</p>
        <input
          class="form-check-input"
          value="yes"
          type="radio"
          name="pregnentMonth"
          id="pregnentMonth1"
        />
        <label class="form-check-label" for="pregnentMonth1"> Yes </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          value="no"
          type="radio"
          name="pregnentMonth"
          id="pregnentMonth2"
          checked
        />
        <label class="form-check-label" for="pregnentMonth2"> No </label>
      </div>
    </div>
    <div id="pregnent-details-container" style="display: none">
      <h3>Add Booking Date</h3>
      <div style="border: 1px solid black; padding: 10px; margin-bottom: 10px">
        <div class="form-group">
          <label for="exampleInputEmail1"
            >Enter Booking date for next session</label
          >
          <input
            type="date"
            class="form-control"
            name="bdate"
            id="pregnency-month"
            placeholder="Enter booking date"
          />
        </div>
      </div>
    </div>
    <button
      type="submit"
      class="button button-contactForm btn_1"
      style="
        border-radius: 5px;
        margin-left: 50%;
        margin-bottom: 100px;
        margin-top: 10px;
      "
    >
      Add
    </button>
  </form>
</div>
<script>
  const addBtn = document.querySelector(".add");
  const input = document.querySelector(".inp-group");
  function removeInput() {
    this.parentElement.remove();
  }
  function addInput() {
    const name = document.createElement("input");
    name.type = "text";
    name.name = "medicine_name";
    name.placeholder = "Enter medicine name";
    const dosage = document.createElement("input");
    dosage.type = "text";
    dosage.name = "medicine_dosage";
    dosage.placeholder = "Enter medicine dosage";
    const quantity = document.createElement("input");
    quantity.type = "text";
    quantity.name = "medicine_quantity";
    quantity.placeholder = "Enter medicine quantity";
    const days = document.createElement("input");
    days.type = "text";
    days.name = "medicine_days";
    days.placeholder = "Enter medicine days";
    const select = document.createElement("select");
    select.name = "medicine_directions";
    const option1 = document.createElement("option");
    option1.value = "Before Food";
    option1.textContent = "Before Food";
    const option2 = document.createElement("option");
    option2.value = "After Food";
    option2.textContent = "After Food";
    // Add more options as needed
    select.appendChild(option1);
    select.appendChild(option2);
    const btn = document.createElement("a");
    btn.className = "delete";
    btn.innerHTML = "&times";
    btn.addEventListener("click", removeInput);
    const flex = document.createElement("div");
    flex.className = "flex";
    input.appendChild(flex);
    flex.appendChild(name);
    flex.appendChild(dosage);
    flex.appendChild(quantity);
    flex.appendChild(days);
    flex.appendChild(select);
    flex.appendChild(btn);
  }
  addBtn.addEventListener("click", addInput);
  const addBtn1 = document.querySelector(".add1");
  const input1 = document.querySelector(".inp-group1");
  function removeInput1() {
    this.parentElement.remove();
  }
  function addInput1() {
    const tname = document.createElement("input");
    tname.type = "text";
    tname.name = "test_name";
    tname.style.width = "90%";
    tname.placeholder = "Enter test name";
    const btn1 = document.createElement("a");
    btn1.className = "delete";
    btn1.innerHTML = "&times";
    btn1.addEventListener("click", removeInput1);
    const flex1 = document.createElement("div");
    flex1.className = "flex";
    input1.appendChild(flex1); // Append to input1 container
    flex1.appendChild(tname);
    flex1.appendChild(btn1);
  }
  addBtn1.addEventListener("click", addInput1);
  document.addEventListener("DOMContentLoaded", function () {
    const pregnentRadioYes = document.querySelector("#pregnentMonth1");
    const pregnentDetailsContainer = document.querySelector(
      "#pregnent-details-container"
    );
    // Event listener for "Is Pregnant?" radio buttons
    pregnentRadioYes.addEventListener("change", function () {
      if (pregnentRadioYes.checked) {
        pregnentDetailsContainer.style.display = "block";
      } else {
        pregnentDetailsContainer.style.display = "none";
      }
    });
    // Event listener for "No" selection in "Is Pregnant?" radio buttons
    const pregnentRadioNo = document.querySelector("#pregnentMonth2");
    pregnentRadioNo.addEventListener("change", function () {
      pregnentDetailsContainer.style.display = "none";
    });
  });
</script>
{% endblock doctor %}
