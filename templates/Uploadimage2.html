{% extends 'hospital_signup.html' %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
{% block index %}
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
background-position: center;
background-repeat: no-repeat;
background-size: cover;
margin-top: 70px; width: 100%; height: 500px;" >
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="breadcrumb_iner">
          <div class="breadcrumb_iner_item" >               
          </div>
        </div>
      </div>
    </div>
  </div>

</section>
<h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Patient Signup</h3>

  <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->

  <section class="contact-section section_padding" style="margin-top: -65px;">
    <div class="container">
    
      <div class="row ">
       
        <div class="col-lg-8 mx-auto">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                    
                    <div class="col-12">
                        <input type="file" class="form-control border-0 bg-light px-4" required placeholder="Image" name="img" style="height: 55px;">
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary w-100 py-3" type="submit">Submit</button>
                        <br>
                    </div>
                    <div class="col-12">
                       <h1>{{msg}}</h1>
                    </div>
                    <div class="col-12">
                        <a href="/PatientViewDoctor">ViewDoctors</a>
                    </div>
                    <div class="col-12">
                        <h1></h1>
                     </div>
                     <div class="col-12">
                        <h1></h1>
                     </div> 
        
                     
                </div>
            </form>
        </div>
        
      </div>
    </div>
  </section>
{% endblock index %}
