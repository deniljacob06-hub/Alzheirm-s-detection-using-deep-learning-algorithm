{% extends 'hospital_signup.html' %}

{% block index %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
background-position: center;
background-repeat: no-repeat;
background-size: cover;
margin-top: 70px; width: 100%; height: 500px;" >
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="breadcrumb_iner">
          <div class="breadcrumb_iner_item" >               
          </div>
        </div>
      </div>
    </div>
  </div>

</section>
<h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Users Login</h3>

  <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->

  <section class="contact-section section_padding " style="margin-top: -65px;">
    <div class="container">
    
      <div class="row ">
        <div class="col-lg-8 mx-auto ">
          <form class="form-contact contact_form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="email"  type="email"  placeholder='Enter email address'>
                </div>
              </div>
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="password"  type="password"  placeholder='Enter password'>
                </div>
              </div>
            </div>
            <div class="form-group mt-3" style="text-align: center;">
              <button type="submit" class="button button-contactForm btn_1" style="border-radius: 5px;">Login</button>
            </div>
          </form>
        </div>
        
      </div>
    </div>
  </section>
{% endblock index %}
