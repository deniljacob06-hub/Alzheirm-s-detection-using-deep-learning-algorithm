{% extends 'hospital_signup.html' %}
{% for message in messages %}
<script>alert('{{message}}')</script>
{% endfor %}
{% block index %}
<section class="breadcrumb_part breadcrumb_bg " style="background-image: url(../static/img/5183184.jpg);
background-position: center;
background-repeat: no-repeat;
background-size: cover;
margin-top: 70px; width: 100%; height: 500px;" >
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="breadcrumb_iner">
          <div class="breadcrumb_iner_item" >               
          </div>
        </div>
      </div>
    </div>
  </div>

</section>
<h3 style=" color: #17a2b8; font-size: 3rem; margin-bottom: 5px; text-align: center;">Patient Signup</h3>

  <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->

  <section class="contact-section section_padding" style="margin-top: -65px;">
    <div class="container">
    
      <div class="row ">
       
        <div class="col-lg-8 mx-auto">
          <form class="form-contact contact_form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
            <div class="col-sm-6">
            <div class="form-group">
                <input class="form-control" name="fname" pattern="[a-zA-Z ]+" required type="text" onfocus="this.placeholder = ''"
                onblur="this.placeholder = 'Enter first name'" placeholder='Enter first name'>
            </div>
            </div>
            <div class="col-sm-6">
            <div class="form-group">
                <input class="form-control" name="lname" pattern="[a-zA-Z ]+" required type="text" onfocus="this.placeholder = ''"
                onblur="this.placeholder = 'Enter last name'" placeholder='Enter last name'>
            </div>
            </div>
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="phone" pattern="[6789][0-9]{9}" maxlength="10" required type="text" onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter phone'" placeholder='Enter phone'>
                </div>
              </div>
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="email"  type="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" required onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter email address'" placeholder='Enter email address'>
                </div>
              </div>
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="password"  type="password" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$" required onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter password'" placeholder='Enter password'>
                </div>
              </div>
              <div class="col-12">
                <div class="form-group">

                  <textarea class="form-control w-100" name="address" cols="30" rows="9"
                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Address'"
                    placeholder='Enter Address'></textarea>
                </div>
              </div>
             
              <div class="col-sm-12">
                <div class="form-group">
                    <select class="form-control" name="gender" aria-label="Default select example" style="display: block;
                    width: 100%;
                    padding: 0.375rem 0.75rem;
                    font-weight: 400;
                    line-height: 1.5;
                    color: #6c757d;
                    transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;">
                        <option selected disabled style="color: #495057;">Choose gender from below</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
              </div>
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="age" pattern="[0-9]+" maxlength="3" required  type="text" onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter age'" placeholder='Enter age'>
                </div>
              </div>
              <div class="col-sm-12">
                <div class="form-group">
                  <input class="form-control" name="weight" pattern="[0-9]+" maxlength="3" required  type="text" onfocus="this.placeholder = ''"
                    onblur="this.placeholder = 'Enter weight'" placeholder='Enter weight'>
                </div>
              </div>
            </div>
            <div class="form-group mt-3" style="text-align: center;">
              <button type="submit" class="button button-contactForm btn_1" style="border-radius: 5px;">Register</button>
            </div>
          </form>
        </div>
        
      </div>
    </div>
  </section>
{% endblock index %}
